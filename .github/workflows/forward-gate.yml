name: forward-gate
on:
  pull_request:
    paths: ["tools/**/*.xml"]

jobs:
  canonical-form:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write   # so the gate can post review suggestions
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0   # the gate diffs the PR against its base
      - uses: richard-burhans/galaxy-tool-refactor/.github/actions/forward-gate@v0.3.5
        with:
          version: "0.3.3"
          mode: suggest
