name: forward-gate
on:
  pull_request:
    paths: ["tools/**/*.xml"]

jobs:
  canonical-form:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0   # the gate diffs the PR against its base
      - uses: richard-burhans/galaxy-tool-refactor/.github/actions/forward-gate@v0.3.1
        with:
          version: "0.3.1"
